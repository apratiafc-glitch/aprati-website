<!DOCTYPE html>
<html>
<head>
    <title>Frontend API Connection Test</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
        }
        .container { 
            max-width: 1000px; 
            margin: 0 auto;
            background: white; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); 
        }
        h1 { color: #1e293b; margin-bottom: 20px; }
        .test-box {
            padding: 20px;
            margin: 15px 0;
            background: #f8fafc;
            border-radius: 8px;
            border-left: 4px solid #cbd5e1;
        }
        .test-box.loading { border-left-color: #3b82f6; background: #dbeafe; }
        .test-box.success { border-left-color: #10b981; background: #d1fae5; }
        .test-box.error { border-left-color: #dc2626; background: #fee2e2; }
        pre {
            background: #1e293b;
            color: #e2e8f0;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            font-size: 13px;
            margin-top: 10px;
        }
        .button {
            padding: 12px 24px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            margin: 10px 5px;
        }
        .button:hover { background: #1d4ed8; }
        .status { font-weight: bold; font-size: 18px; margin-bottom: 10px; }
        .brand-card {
            display: inline-block;
            margin: 10px;
            padding: 15px;
            background: white;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            text-align: center;
            min-width: 200px;
        }
        .brand-card img {
            width: 100px;
            height: 100px;
            object-fit: contain;
            border-radius: 8px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Frontend API Connection Test</h1>
        <p style="color: #64748b; margin-bottom: 20px;">Testing if frontend can connect to backend API</p>

        <button class="button" onclick="runAllTests()">🚀 Run All Tests</button>

        <div id="results"></div>
    </div>

    <script>
        const API_URL = 'https://sdev.apratifoods.asia/api';
        const resultsDiv = document.getElementById('results');

        async function runAllTests() {
            resultsDiv.innerHTML = '<div class="test-box loading"><div class="status">⏳ Running tests...</div></div>';
            
            const tests = [
                { name: 'Test 1: API Health Check', url: `${API_URL}/brands`, description: 'Check if API is reachable' },
                { name: 'Test 2: Brands with Images', url: `${API_URL}/brands`, description: 'Test brand data and image URLs' },
                { name: 'Test 3: Products Data', url: `${API_URL}/products`, description: 'Check if products endpoint works' },
                { name: 'Test 4: Image Loading', url: 'https://sdev.apratifoods.asia/storage/brands/logos/1y5a9P4pyqJpuQD1xHWh0z9YnYIy419Bk2pWh8EP.png', description: 'Test if images load correctly' }
            ];

            let html = '';

            for (const test of tests) {
                html += await runTest(test);
            }

            resultsDiv.innerHTML = html;
        }

        async function runTest(test) {
            try {
                const startTime = performance.now();
                
                if (test.name.includes('Image')) {
                    // Test image loading
                    return new Promise((resolve) => {
                        const img = new Image();
                        img.onload = () => {
                            const endTime = performance.now();
                            resolve(`
                                <div class="test-box success">
                                    <div class="status">✅ ${test.name}</div>
                                    <p><strong>${test.description}</strong></p>
                                    <p>Time: ${(endTime - startTime).toFixed(2)}ms</p>
                                    <p>Image loaded successfully:</p>
                                    <img src="${test.url}" style="max-width: 200px; margin-top: 10px; border: 2px solid #10b981; border-radius: 8px;">
                                </div>
                            `);
                        };
                        img.onerror = () => {
                            const endTime = performance.now();
                            resolve(`
                                <div class="test-box error">
                                    <div class="status">❌ ${test.name}</div>
                                    <p><strong>${test.description}</strong></p>
                                    <p>Time: ${(endTime - startTime).toFixed(2)}ms</p>
                                    <p style="color: #dc2626;">❌ Image failed to load</p>
                                    <p><code>${test.url}</code></p>
                                </div>
                            `);
                        };
                        img.src = test.url;
                    });
                }

                const response = await fetch(test.url);
                const endTime = performance.now();
                const contentType = response.headers.get('content-type');
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();

                let testResult = '';

                if (test.name.includes('Brands')) {
                    // Show brands with images
                    testResult = '<div style="margin-top: 15px;"><strong>Brands Found:</strong><br>';
                    if (data.data && data.data.brands) {
                        data.data.brands.forEach(brand => {
                            testResult += `
                                <div class="brand-card">
                                    <img src="${brand.logo_url}" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22100%22><text x=%2250%%22 y=%2250%%22 text-anchor=%22middle%22 dy=%22.3em%22>❌</text></svg>'">
                                    <div><strong>${brand.name}</strong></div>
                                    <div style="font-size: 12px; color: #64748b;">${brand.products_count} products</div>
                                </div>
                            `;
                        });
                    }
                    testResult += '</div>';
                }

                return `
                    <div class="test-box success">
                        <div class="status">✅ ${test.name}</div>
                        <p><strong>${test.description}</strong></p>
                        <p>Status: <span style="color: #10b981;">${response.status} ${response.statusText}</span></p>
                        <p>Content-Type: <code>${contentType}</code></p>
                        <p>Response Time: ${(endTime - startTime).toFixed(2)}ms</p>
                        ${testResult}
                        <details>
                            <summary style="cursor: pointer; margin-top: 10px;">View Raw Response</summary>
                            <pre>${JSON.stringify(data, null, 2)}</pre>
                        </details>
                    </div>
                `;

            } catch (error) {
                return `
                    <div class="test-box error">
                        <div class="status">❌ ${test.name}</div>
                        <p><strong>${test.description}</strong></p>
                        <p style="color: #dc2626;">Error: ${error.message}</p>
                        <p><code>${test.url}</code></p>
                    </div>
                `;
            }
        }

        // Auto-run tests on page load
        window.onload = () => runAllTests();
    </script>
</body>
</html>
