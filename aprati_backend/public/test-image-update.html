<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Image Upload</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        .form-group { margin: 15px 0; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, textarea { width: 100%; padding: 8px; }
        button { background: #007bff; color: white; padding: 10px 20px; border: none; cursor: pointer; }
        button:hover { background: #0056b3; }
        #result { margin-top: 20px; padding: 15px; border: 1px solid #ddd; background: #f9f9f9; }
        .log { font-family: monospace; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h1>Test Product Image Update</h1>
    
    <div class="form-group">
        <label for="productId">Product ID:</label>
        <input type="number" id="productId" value="4">
    </div>
    
    <div class="form-group">
        <label for="productName">Product Name:</label>
        <input type="text" id="productName" value="Test Product">
    </div>
    
    <div class="form-group">
        <label for="brandId">Brand ID:</label>
        <input type="number" id="brandId" value="1">
    </div>
    
    <div class="form-group">
        <label for="existingImages">Existing Images (comma separated URLs):</label>
        <textarea id="existingImages" rows="3">/storage/products/test1.jpg,/storage/products/test2.jpg</textarea>
    </div>
    
    <div class="form-group">
        <label for="newImages">New Images (select files):</label>
        <input type="file" id="newImages" multiple accept="image/*">
    </div>
    
    <button onclick="testUpdate()">Test Update</button>
    
    <div id="result"></div>
    
    <script>
        async function testUpdate() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<p>Processing...</p>';
            
            try {
                // Step 1: Login
                resultDiv.innerHTML += '<p>Step 1: Logging in...</p>';
                const loginResponse = await fetch('http://127.0.0.1:8000/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: 'admin@aprati.com',
                        password: 'password123'
                    })
                });
                
                const loginData = await loginResponse.json();
                if (!loginData.success) {
                    throw new Error('Login failed: ' + JSON.stringify(loginData));
                }
                
                const token = loginData.data.token;
                resultDiv.innerHTML += '<p class="log">✓ Logged in, token: ' + token.substring(0, 20) + '...</p>';
                
                // Step 2: Prepare FormData
                resultDiv.innerHTML += '<p>Step 2: Preparing form data...</p>';
                const formData = new FormData();
                
                formData.append('brand_id', document.getElementById('brandId').value);
                formData.append('name', document.getElementById('productName').value);
                formData.append('_method', 'PUT');
                
                // Add existing images
                const existingImages = document.getElementById('existingImages').value.split(',').map(img => img.trim()).filter(img => img);
                existingImages.forEach((img, index) => {
                    formData.append(`existing_images[${index}]`, img);
                    resultDiv.innerHTML += `<p class="log">  - existing_images[${index}] = ${img}</p>`;
                });
                
                // Add new image files
                const newImageFiles = document.getElementById('newImages').files;
                for (let i = 0; i < newImageFiles.length; i++) {
                    formData.append(`new_images[${i}]`, newImageFiles[i]);
                    resultDiv.innerHTML += `<p class="log">  - new_images[${i}] = ${newImageFiles[i].name}</p>`;
                }
                
                // Step 3: Send update request
                resultDiv.innerHTML += '<p>Step 3: Sending update request...</p>';
                const productId = document.getElementById('productId').value;
                const updateResponse = await fetch(`http://127.0.0.1:8000/api/admin/products/${productId}`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Accept': 'application/json'
                    },
                    body: formData
                });
                
                const updateData = await updateResponse.json();
                resultDiv.innerHTML += '<p class="log">Response Status: ' + updateResponse.status + '</p>';
                resultDiv.innerHTML += '<p class="log">Response Data: ' + JSON.stringify(updateData, null, 2) + '</p>';
                
                if (updateData.success) {
                    resultDiv.innerHTML += '<h3 style="color: green;">✓ Update successful!</h3>';
                    resultDiv.innerHTML += '<p class="log">Product Images: ' + JSON.stringify(updateData.data.product.images, null, 2) + '</p>';
                } else {
                    resultDiv.innerHTML += '<h3 style="color: red;">✗ Update failed!</h3>';
                    resultDiv.innerHTML += '<p class="log">Error: ' + JSON.stringify(updateData, null, 2) + '</p>';
                }
                
            } catch (error) {
                resultDiv.innerHTML += '<h3 style="color: red;">✗ Error!</h3>';
                resultDiv.innerHTML += '<p class="log">' + error.message + '</p>';
                console.error(error);
            }
        }
    </script>
</body>
</html>
