<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Direct Test - Aprati Foods</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 1200px;
            margin: 50px auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        h1 {
            color: #333;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }
        .test-section {
            margin: 20px 0;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }
        .result {
            margin-top: 10px;
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 12px;
            white-space: pre-wrap;
            word-wrap: break-word;
            max-height: 300px;
            overflow-y: auto;
        }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            margin: 5px;
        }
        button:hover { background: #5568d3; }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f4f6;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 API Direct Connection Test</h1>
        <p>Testing direct API connectivity from browser to backend</p>
        
        <div class="test-section">
            <h3>📍 Server Information</h3>
            <div class="result info" id="serverInfo">Loading...</div>
        </div>

        <div class="test-section">
            <h3>🔧 PHP Backend Test</h3>
            <button onclick="testPHPBackend()">Test PHP Backend</button>
            <div class="result" id="phpResult" style="display:none;"></div>
        </div>

        <div class="test-section">
            <h3>🌐 API Endpoints Test</h3>
            <button onclick="testAllEndpoints()">Test All Endpoints</button>
            <button onclick="clearResults()">Clear Results</button>
            <div id="endpointResults"></div>
        </div>

        <div class="test-section">
            <h3>📝 Laravel Route List</h3>
            <button onclick="testRouteList()">Get Route List</button>
            <div class="result" id="routeResult" style="display:none;"></div>
        </div>
    </div>

    <script>
        // Display server info
        document.getElementById('serverInfo').innerHTML = `
Current URL: ${window.location.href}
Protocol: ${window.location.protocol}
Host: ${window.location.host}
Pathname: ${window.location.pathname}
Browser: ${navigator.userAgent}
Time: ${new Date().toLocaleString()}
        `;

        const apiEndpoints = [
            '/api/brands',
            '/api/information-sections',
            '/api/header-settings',
            '/api/footer-settings',
            '/api/hero-image',
            '/api/hero-content',
            '/api/admin-profile-image',
            '/api/about-content',
        ];

        async function testPHPBackend() {
            const resultDiv = document.getElementById('phpResult');
            resultDiv.style.display = 'block';
            resultDiv.className = 'result info';
            resultDiv.innerHTML = '<div class="loading"></div> Testing PHP backend...';

            try {
                // Create a test PHP file content
                const testURL = '/api-test.php';
                const response = await fetch(testURL);
                const data = await response.json();

                if (response.ok) {
                    resultDiv.className = 'result success';
                    resultDiv.innerHTML = `✅ PHP Backend is working!\n\n${JSON.stringify(data, null, 2)}`;
                } else {
                    resultDiv.className = 'result error';
                    resultDiv.innerHTML = `❌ PHP Backend returned error: ${response.status}\n\n${JSON.stringify(data, null, 2)}`;
                }
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.innerHTML = `❌ Failed to connect to PHP backend\nError: ${error.message}\n\nMake sure api-test.php is uploaded to the server public directory.`;
            }
        }

        async function testEndpoint(endpoint) {
            const fullURL = window.location.origin + endpoint;
            const startTime = performance.now();
            
            try {
                const response = await fetch(endpoint, {
                    method: 'GET',
                    headers: {
                        'Accept': 'application/json',
                        'X-Requested-With': 'XMLHttpRequest'
                    }
                });
                
                const endTime = performance.now();
                const duration = Math.round(endTime - startTime);
                
                let data;
                const contentType = response.headers.get('content-type');
                
                if (contentType && contentType.includes('application/json')) {
                    data = await response.json();
                } else {
                    const text = await response.text();
                    data = { error: 'Non-JSON response', content: text.substring(0, 500) };
                }
                
                return {
                    endpoint,
                    status: response.status,
                    ok: response.ok,
                    duration,
                    contentType,
                    data
                };
            } catch (error) {
                return {
                    endpoint,
                    status: 'Error',
                    ok: false,
                    error: error.message
                };
            }
        }

        async function testAllEndpoints() {
            const resultsDiv = document.getElementById('endpointResults');
            resultsDiv.innerHTML = '<div class="loading"></div> Testing endpoints...';
            
            const results = [];
            for (const endpoint of apiEndpoints) {
                const result = await testEndpoint(endpoint);
                results.push(result);
            }
            
            let html = '';
            let successCount = 0;
            let failCount = 0;
            
            results.forEach(result => {
                const isSuccess = result.ok;
                if (isSuccess) successCount++;
                else failCount++;
                
                const className = isSuccess ? 'success' : 'error';
                const icon = isSuccess ? '✅' : '❌';
                
                html += `
                    <div class="result ${className}" style="margin-top: 10px;">
                        <strong>${icon} ${result.endpoint}</strong><br>
                        Status: ${result.status}${result.duration ? ` | Time: ${result.duration}ms` : ''}<br>
                        ${result.contentType ? `Content-Type: ${result.contentType}<br>` : ''}
                        ${result.error ? `Error: ${result.error}<br>` : ''}
                        <details>
                            <summary>View Response</summary>
                            <pre>${JSON.stringify(result.data || result.error, null, 2)}</pre>
                        </details>
                    </div>
                `;
            });
            
            resultsDiv.innerHTML = `
                <div class="result info" style="margin-top: 10px;">
                    <strong>Summary:</strong> ${successCount} successful, ${failCount} failed
                </div>
                ${html}
            `;
        }

        async function testRouteList() {
            const resultDiv = document.getElementById('routeResult');
            resultDiv.style.display = 'block';
            resultDiv.className = 'result info';
            resultDiv.innerHTML = '<div class="loading"></div> Getting route list...';

            try {
                // This would require a PHP endpoint that runs 'php artisan route:list'
                resultDiv.className = 'result info';
                resultDiv.innerHTML = `ℹ️ Route list requires server-side access.\n\nRun this command on your server:\nphp artisan route:list --path=api\n\nOr check the check-api-endpoints.php script.`;
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.innerHTML = `❌ Error: ${error.message}`;
            }
        }

        function clearResults() {
            document.getElementById('endpointResults').innerHTML = '';
            document.getElementById('phpResult').style.display = 'none';
            document.getElementById('routeResult').style.display = 'none';
        }

        // Auto-test on load
        window.addEventListener('load', () => {
            testPHPBackend();
        });
    </script>
</body>
</html>
