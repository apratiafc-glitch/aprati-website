<!DOCTYPE html>
<html>
<head>
    <title>Brands Endpoint Diagnostic</title>
    <style>
        body {
            font-family: monospace;
            background: #1e1e1e;
            color: #00ff00;
            padding: 20px;
        }
        .section {
            background: #2d2d2d;
            padding: 20px;
            margin: 20px 0;
            border-radius: 8px;
            border-left: 4px solid #00ff00;
        }
        .error { color: #ff5555; }
        .success { color: #50fa7b; }
        .warning { color: #ffb86c; }
        pre {
            background: #1e1e1e;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <h1>🔍 Brands Endpoint Diagnostic</h1>
    
    <div class="section">
        <h2>Test 1: Direct API Call</h2>
        <p>Testing: <strong>https://sdev.apratifoods.asia/api/brands</strong></p>
        <div id="test1"></div>
    </div>

    <div class="section">
        <h2>Test 2: With Cache Buster</h2>
        <p>Testing with ?t=timestamp to bypass cache</p>
        <div id="test2"></div>
    </div>

    <div class="section">
        <h2>Test 3: Response Headers</h2>
        <div id="test3"></div>
    </div>

    <div class="section">
        <h2>Test 4: Compare All Endpoints</h2>
        <div id="test4"></div>
    </div>

    <script>
        async function testEndpoint(url, resultId) {
            const resultDiv = document.getElementById(resultId);
            resultDiv.innerHTML = '⏳ Testing...';

            try {
                const response = await fetch(url, {
                    method: 'GET',
                    headers: { 'Accept': 'application/json' },
                    cache: 'no-cache'
                });

                const contentType = response.headers.get('content-type');
                const text = await response.text();
                
                let result = `<strong>Status:</strong> ${response.status}<br>`;
                result += `<strong>Content-Type:</strong> ${contentType}<br><br>`;

                if (text.includes('<!DOCTYPE') || text.includes('<html')) {
                    result += `<span class="error">❌ HTML Response (Homepage)</span><br>`;
                    result += `<strong>Response Preview:</strong><br>`;
                    result += `<pre>${text.substring(0, 300)}...</pre>`;
                } else {
                    try {
                        const json = JSON.parse(text);
                        result += `<span class="success">✅ Valid JSON Response</span><br>`;
                        result += `<strong>Data:</strong><br>`;
                        result += `<pre>${JSON.stringify(json, null, 2)}</pre>`;
                    } catch (e) {
                        result += `<span class="warning">⚠️ Not JSON</span><br>`;
                        result += `<pre>${text.substring(0, 500)}</pre>`;
                    }
                }

                resultDiv.innerHTML = result;
            } catch (error) {
                resultDiv.innerHTML = `<span class="error">❌ Error: ${error.message}</span>`;
            }
        }

        async function testHeaders() {
            const resultDiv = document.getElementById('test3');
            resultDiv.innerHTML = '⏳ Testing...';

            try {
                const response = await fetch('https://sdev.apratifoods.asia/api/brands', {
                    method: 'HEAD',
                    cache: 'no-cache'
                });

                let result = '<strong>Response Headers:</strong><br><br>';
                response.headers.forEach((value, key) => {
                    result += `<strong>${key}:</strong> ${value}<br>`;
                });

                resultDiv.innerHTML = result;
            } catch (error) {
                resultDiv.innerHTML = `<span class="error">❌ Error: ${error.message}</span>`;
            }
        }

        async function compareEndpoints() {
            const resultDiv = document.getElementById('test4');
            resultDiv.innerHTML = '⏳ Testing all endpoints...';

            const endpoints = [
                '/api/brands',
                '/api/products',
                '/api/careers',
                '/api/header-settings',
                '/api/footer-settings'
            ];

            let result = '<table style="width:100%; border-collapse: collapse;">';
            result += '<tr style="background: #333;"><th style="padding: 10px; text-align: left;">Endpoint</th><th>Status</th><th>Type</th><th>Result</th></tr>';

            for (const endpoint of endpoints) {
                try {
                    const response = await fetch(`https://sdev.apratifoods.asia${endpoint}`, {
                        method: 'GET',
                        headers: { 'Accept': 'application/json' },
                        cache: 'no-cache'
                    });

                    const contentType = response.headers.get('content-type');
                    const text = await response.text();
                    const isHTML = text.includes('<!DOCTYPE') || text.includes('<html');
                    const status = response.status;

                    const statusClass = status === 200 ? 'success' : 'error';
                    const typeClass = isHTML ? 'error' : 'success';
                    const resultText = isHTML ? '❌ HTML' : '✅ JSON';

                    result += `<tr style="border-bottom: 1px solid #444;">`;
                    result += `<td style="padding: 10px;">${endpoint}</td>`;
                    result += `<td class="${statusClass}">${status}</td>`;
                    result += `<td>${contentType || 'N/A'}</td>`;
                    result += `<td class="${typeClass}">${resultText}</td>`;
                    result += `</tr>`;
                } catch (error) {
                    result += `<tr><td>${endpoint}</td><td colspan="3" class="error">Error: ${error.message}</td></tr>`;
                }
            }

            result += '</table>';
            resultDiv.innerHTML = result;
        }

        // Run tests on load
        window.onload = async () => {
            await testEndpoint('https://sdev.apratifoods.asia/api/brands', 'test1');
            await testEndpoint(`https://sdev.apratifoods.asia/api/brands?t=${Date.now()}`, 'test2');
            await testHeaders();
            await compareEndpoints();
        };
    </script>
</body>
</html>
