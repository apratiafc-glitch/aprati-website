<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Image Test - Aprati Foods</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .section {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .section h2 {
            color: #667eea;
            margin-bottom: 20px;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }
        .test-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .image-card {
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 15px;
            background: #f9f9f9;
            transition: all 0.3s;
        }
        .image-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .image-container {
            width: 100%;
            height: 200px;
            background: #e0e0e0;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin-bottom: 10px;
            position: relative;
        }
        .image-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        .image-status {
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
            font-weight: bold;
            display: inline-block;
            margin-top: 5px;
        }
        .status-loading {
            background: #ffc107;
            color: #000;
        }
        .status-success {
            background: #4caf50;
            color: white;
        }
        .status-error {
            background: #f44336;
            color: white;
        }
        .image-info {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
            word-break: break-all;
        }
        .summary {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
            color: white;
        }
        .summary-item {
            text-align: center;
        }
        .summary-number {
            font-size: 2em;
            font-weight: bold;
        }
        .summary-label {
            font-size: 0.9em;
            opacity: 0.9;
        }
        .api-response {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 12px;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .placeholder {
            font-size: 48px;
            opacity: 0.3;
        }
        .refresh-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            transition: all 0.3s;
            display: block;
            margin: 20px auto;
        }
        .refresh-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🖼️ Complete Image Test</h1>

        <!-- Summary -->
        <div class="section">
            <h2>📊 Summary</h2>
            <div class="summary">
                <div class="summary-item">
                    <div class="summary-number" id="total-count">0</div>
                    <div class="summary-label">Total Images</div>
                </div>
                <div class="summary-item">
                    <div class="summary-number" id="success-count">0</div>
                    <div class="summary-label">✅ Loaded</div>
                </div>
                <div class="summary-item">
                    <div class="summary-number" id="error-count">0</div>
                    <div class="summary-label">❌ Failed</div>
                </div>
            </div>
            <button class="refresh-btn" onclick="location.reload()">🔄 Refresh Test</button>
        </div>

        <!-- Brand Logos from API -->
        <div class="section">
            <h2>🏷️ Brand Logos (from API)</h2>
            <div id="brand-logos" class="loading">
                <div class="spinner"></div>
                <p>Loading brand logos...</p>
            </div>
        </div>

        <!-- Products from API -->
        <div class="section">
            <h2>📦 Product Images (from API)</h2>
            <div id="product-images" class="loading">
                <div class="spinner"></div>
                <p>Loading product images...</p>
            </div>
        </div>

        <!-- Direct Storage Test -->
        <div class="section">
            <h2>💾 Direct Storage Test</h2>
            <div id="storage-test" class="test-grid"></div>
        </div>

        <!-- API Responses -->
        <div class="section">
            <h2>📡 API Responses</h2>
            <div id="api-responses"></div>
        </div>
    </div>

    <script>
        let totalImages = 0;
        let successImages = 0;
        let errorImages = 0;

        function updateSummary() {
            document.getElementById('total-count').textContent = totalImages;
            document.getElementById('success-count').textContent = successImages;
            document.getElementById('error-count').textContent = errorImages;
        }

        function createImageCard(title, imageUrl, type = 'default') {
            totalImages++;
            updateSummary();

            const card = document.createElement('div');
            card.className = 'image-card';
            
            const container = document.createElement('div');
            container.className = 'image-container';
            
            const placeholder = document.createElement('div');
            placeholder.className = 'placeholder';
            placeholder.textContent = type === 'brand' ? '🏷️' : '📦';
            container.appendChild(placeholder);
            
            const img = document.createElement('img');
            img.alt = title;
            
            const status = document.createElement('span');
            status.className = 'image-status status-loading';
            status.textContent = '⏳ Loading...';
            
            const info = document.createElement('div');
            info.className = 'image-info';
            info.innerHTML = `<strong>${title}</strong><br>${imageUrl}`;
            
            img.onload = () => {
                placeholder.style.display = 'none';
                container.appendChild(img);
                status.className = 'image-status status-success';
                status.textContent = '✅ Loaded';
                successImages++;
                updateSummary();
            };
            
            img.onerror = () => {
                placeholder.textContent = '❌';
                status.className = 'image-status status-error';
                status.textContent = '❌ Failed to load';
                errorImages++;
                updateSummary();
            };
            
            // Add timestamp to prevent caching
            img.src = imageUrl.includes('?') ? `${imageUrl}&t=${Date.now()}` : `${imageUrl}?t=${Date.now()}`;
            
            card.appendChild(container);
            card.appendChild(status);
            card.appendChild(info);
            
            return card;
        }

        async function loadBrands() {
            try {
                const response = await fetch('/api/brands?t=' + Date.now());
                const data = await response.json();
                
                // Show API response
                const apiDiv = document.getElementById('api-responses');
                apiDiv.innerHTML += `<h3>Brands API Response:</h3><pre class="api-response">${JSON.stringify(data, null, 2)}</pre>`;
                
                const container = document.getElementById('brand-logos');
                container.innerHTML = '';
                container.className = 'test-grid';
                
                if (data.status === 'success' && data.data && data.data.brands) {
                    const brands = data.data.brands;
                    
                    if (brands.length === 0) {
                        container.innerHTML = '<p style="text-align:center; color:#666;">No brands found in database</p>';
                        return;
                    }
                    
                    brands.forEach(brand => {
                        let logoUrl = brand.logo_url;
                        
                        // Construct full URL for storage paths
                        if (logoUrl && logoUrl.startsWith('/storage/')) {
                            logoUrl = window.location.origin + logoUrl;
                        } else if (!logoUrl || logoUrl === '') {
                            logoUrl = '/images/default-brand.png';
                        }
                        
                        const card = createImageCard(
                            brand.name || 'Unnamed Brand',
                            logoUrl,
                            'brand'
                        );
                        container.appendChild(card);
                    });
                } else {
                    container.innerHTML = '<p style="text-align:center; color:#f44336;">Failed to load brands from API</p>';
                }
            } catch (error) {
                console.error('Error loading brands:', error);
                document.getElementById('brand-logos').innerHTML = 
                    `<p style="text-align:center; color:#f44336;">Error: ${error.message}</p>`;
            }
        }

        async function loadProducts() {
            try {
                const response = await fetch('/api/products?t=' + Date.now());
                const data = await response.json();
                
                // Show API response (truncated if too long)
                const apiDiv = document.getElementById('api-responses');
                const responseStr = JSON.stringify(data, null, 2);
                const truncated = responseStr.length > 5000 ? responseStr.substring(0, 5000) + '\n... (truncated)' : responseStr;
                apiDiv.innerHTML += `<h3>Products API Response:</h3><pre class="api-response">${truncated}</pre>`;
                
                const container = document.getElementById('product-images');
                container.innerHTML = '';
                container.className = 'test-grid';
                
                let products = [];
                
                // Handle different response structures
                if (data.status === 'success' && data.data) {
                    if (Array.isArray(data.data)) {
                        products = data.data;
                    } else if (data.data.products) {
                        products = Array.isArray(data.data.products) ? data.data.products : 
                                  (data.data.products.data || []);
                    }
                }
                
                if (products.length === 0) {
                    container.innerHTML = '<p style="text-align:center; color:#666;">No products found in database</p>';
                    return;
                }
                
                // Show first 12 products
                products.slice(0, 12).forEach(product => {
                    let imageUrl = product.image_url || product.main_image;
                    
                    // Construct full URL for storage paths
                    if (imageUrl && imageUrl.startsWith('/storage/')) {
                        imageUrl = window.location.origin + imageUrl;
                    } else if (!imageUrl || imageUrl === '') {
                        imageUrl = '/images/default-product.png';
                    }
                    
                    const card = createImageCard(
                        product.name || 'Unnamed Product',
                        imageUrl,
                        'product'
                    );
                    container.appendChild(card);
                });
                
            } catch (error) {
                console.error('Error loading products:', error);
                document.getElementById('product-images').innerHTML = 
                    `<p style="text-align:center; color:#f44336;">Error: ${error.message}</p>`;
            }
        }

        async function testDirectStorage() {
            const container = document.getElementById('storage-test');
            container.innerHTML = '<p style="text-align:center; color:#666;">Direct storage test disabled - using real API data above</p>';
        }

        // Load everything on page load
        window.addEventListener('DOMContentLoaded', () => {
            loadBrands();
            loadProducts();
            testDirectStorage();
        });
    </script>
</body>
</html>
